version: '3.9'

services:
  # ── Frontend (Nginx + TLS) ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: qrbeam-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend-dist:/usr/share/nginx/html:ro
      - certbot-certs:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - signaling
    networks:
      - qrbeam-net

  # ── Signaling Server ────────────────────────────────────────────────────
  signaling:
    build:
      context: ../qr-beam-signaling
      dockerfile: Dockerfile
    container_name: qrbeam-signaling
    restart: unless-stopped
    environment:
      PORT: "8443"
      USE_TLS: "false"  # TLS terminated by nginx
      NODE_ENV: "production"
    expose:
      - "8443"
    networks:
      - qrbeam-net

  # ── STUN/TURN Server (coturn) ───────────────────────────────────────────
  coturn:
    image: coturn/coturn:alpine
    container_name: qrbeam-coturn
    restart: unless-stopped
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/udp"   # TLS TURN
      - "5349:5349/tcp"
      - "49152-65535:49152-65535/udp"  # relay ports
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - certbot-certs:/etc/letsencrypt:ro
    networks:
      - qrbeam-net

  # ── Let's Encrypt (auto-renew) ──────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: qrbeam-certbot
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM; while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done;"

volumes:
  certbot-certs:
  certbot-www:

networks:
  qrbeam-net:
    driver: bridge
